name: Update Dashboard Data

on:
  schedule:
    # 毎朝7時（JST）= UTC 22:00（前日）
    - cron: '0 22 * * *'
  workflow_dispatch:
    # 手動実行も可能（GitHubのActionsタブ → Run workflow）

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run update script
        env:
          CHATWORK_API_TOKEN_1: ${{ secrets.CHATWORK_API_TOKEN_1 }}
          CHATWORK_API_TOKEN_2: ${{ secrets.CHATWORK_API_TOKEN_2 }}
          CLAUDE_API_KEY:       ${{ secrets.CLAUDE_API_KEY }}
          SHEET_ID:             ${{ secrets.SHEET_ID }}
          DASHBOARD_PASSWORD:   ${{ secrets.DASHBOARD_PASSWORD }}
        run: python scripts/update_data.py

      - name: Commit and push data.enc
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.enc
          git diff --staged --quiet || git commit -m "chore: update dashboard data $(date +'%Y-%m-%d %H:%M JST')"
          git push

  deploy:
    needs: update
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main  # 最新コミット（update jobでpushされたもの）

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
